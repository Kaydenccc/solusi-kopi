server {
    listen 80;
    server_name solusikopi.online www.solusikopi.online;

    # Redirect HTTP to HTTPS (aktifkan setelah SSL terpasang)
    # return 301 https://$host$request_uri;

    root /var/www/solusi-kopi/public;
    index index.php index.html;

    charset utf-8;

    # Batas upload file (untuk gambar produk, dll)
    client_max_body_size 10M;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Blokir akses ke file sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    # Blokir eksekusi PHP di folder upload
    location ~* /uploads/.*\.php$ {
        deny all;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Logging
    access_log /var/log/nginx/solusi-kopi-access.log;
    error_log /var/log/nginx/solusi-kopi-error.log;
}
